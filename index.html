<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSL 2026</title>
<style>
:root{--g:#f0c030;--dk:#0a1a0f;--cd:#12201a;--br:#1e3828;--tx:#f5f0e0;--t2:#a0b890;--red:#c0392b;--grn:#4cff8a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--dk);color:var(--tx);min-height:100vh;}

/* ── LOGIN ── */
#login-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at top,#1a3a20,#0a1a0f 70%);}
.lbox{background:var(--cd);border:1px solid var(--br);border-radius:16px;padding:28px 22px;width:100%;max-width:320px;text-align:center;}
.lbox img.psl-logo{width:120px;height:120px;object-fit:contain;margin:0 auto 12px;display:block;}
.lbox h2{color:var(--g);font-size:22px;font-weight:900;margin-bottom:4px;}
.lbox p{color:var(--t2);font-size:11px;margin-bottom:20px;letter-spacing:.08em;text-transform:uppercase;}
.lbox label{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;margin-top:14px;text-align:left;}
.lbox select,.lbox input{display:block;width:100%;padding:11px 12px;font-size:14px;background:#0d1f15;border:1.5px solid var(--br);border-radius:10px;color:var(--tx);outline:none;text-align:left;}
.lbox select:focus,.lbox input:focus{border-color:var(--g);}
.lbox button{display:block;width:100%;padding:13px;margin-top:18px;font-size:15px;font-weight:800;background:linear-gradient(135deg,#f0c030,#c8900a);color:#0a1a0f;border:none;border-radius:11px;cursor:pointer;}
#lerr{color:#ff6b6b;font-size:12px;text-align:center;margin-top:10px;min-height:16px;}
#ref-div{display:none;}

/* ── APP ── */
#app-wrap{display:none;}
.nav{position:fixed;bottom:0;left:0;right:0;background:#0d1f15;border-top:1px solid var(--br);display:flex;z-index:999;}
.nb{flex:1;padding:10px 2px 8px;font-size:9px;font-weight:700;text-align:center;border:none;background:transparent;cursor:pointer;color:#5a7a60;text-transform:uppercase;letter-spacing:.02em;}
.nb .ni{display:block;font-size:20px;margin-bottom:1px;}
.nb.on{color:var(--g);}
.pg{display:none;padding:14px 14px 84px;max-width:520px;margin:0 auto;}
.pg.on{display:block;}

/* ── COMMON ── */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.ptt{font-size:20px;font-weight:800;color:var(--g);}
.rbd{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;margin-left:8px;vertical-align:middle;}
.rbd.adm{background:#3d2800;color:var(--g);}
.rbd.ref{background:#0d2a3d;color:#60c8f0;}
.rbd.view{background:#1a2a1a;color:var(--t2);}
.sobt{font-size:11px;font-weight:700;color:var(--t2);background:transparent;border:1px solid var(--br);border-radius:8px;padding:5px 10px;cursor:pointer;}
.card{background:var(--cd);border:1px solid var(--br);border-radius:12px;padding:14px;margin-bottom:10px;}
.sec{font-size:11px;font-weight:800;color:var(--g);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 8px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.fs{display:block;width:100%;padding:9px 10px;font-size:13px;background:#0d1f15;border:1.5px solid var(--br);border-radius:10px;color:var(--tx);margin-bottom:10px;outline:none;}
.fs:focus{border-color:var(--g);}

/* ── HOME ── */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.ic{background:var(--cd);border:1px solid var(--br);border-radius:10px;padding:10px 12px;}
.il{font-size:10px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.iv{font-size:13px;font-weight:700;}
.gg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
.gc{background:var(--cd);border:1px solid var(--br);border-radius:10px;padding:10px 8px;}
.gl{font-size:10px;font-weight:800;color:var(--g);text-align:center;margin-bottom:8px;text-transform:uppercase;}
.gt{display:flex;flex-direction:column;align-items:center;margin-bottom:7px;}
.gt img,.gt .ini{width:28px;height:28px;border-radius:50%;object-fit:contain;background:#fff;margin-bottom:3px;}
.ini{background:#1a7a3f;color:#f0c030;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.gtn{font-size:9px;color:var(--t2);text-align:center;line-height:1.2;}
.fc{background:var(--cd);border:1px solid var(--br);border-radius:12px;padding:12px;margin-bottom:8px;}
.ft{font-size:10px;color:var(--t2);margin-bottom:10px;font-weight:600;}
.fr{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;margin-bottom:6px;}
.fr:last-child{margin-bottom:0;}
.ftm{display:flex;align-items:center;gap:5px;}
.ftm.r{flex-direction:row-reverse;}
.ftm img,.ftm .ini{width:20px;height:20px;border-radius:50%;object-fit:contain;background:#fff;flex-shrink:0;}
.ftn{font-size:11px;font-weight:700;}
.fvs{font-size:10px;font-weight:800;color:var(--g);text-align:center;}

/* ── STATUS DASHBOARD ── */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.status-card{background:var(--cd);border:1px solid var(--br);border-radius:10px;padding:10px 12px;}
.status-card.done{border-color:#1a5a30;background:#0a1f12;}
.status-card.prog{border-color:#8a6000;background:#1a1200;}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}
.dot-done{background:var(--grn);}
.dot-prog{background:var(--g);}
.dot-idle{background:#3a5a40;}
.status-tie{font-size:11px;font-weight:700;color:var(--tx);}
.status-score{font-size:10px;color:var(--t2);margin-top:3px;}

/* ── LINEUP ── */
.mb{border:1px solid var(--br);border-radius:10px;padding:11px 12px;margin-bottom:8px;background:#0d1a12;}
.mn{font-size:10px;font-weight:800;color:var(--g);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
.vg{display:grid;grid-template-columns:1fr 26px 1fr;gap:5px;align-items:start;}
.vt{font-size:11px;color:var(--t2);text-align:center;padding-top:8px;font-weight:800;}
.ps{display:block;width:100%;padding:8px;font-size:12px;background:#0a1a0f;border:1.5px solid var(--br);border-radius:8px;color:var(--tx);margin-bottom:4px;outline:none;}
.ps:focus{border-color:var(--g);}
.ps.plate-fill{border-color:#8a6000;background:#1a1200;}
.mgrl{font-size:11px;color:var(--t2);margin-bottom:12px;font-style:italic;}
.sbtn{display:block;width:100%;padding:12px;font-size:14px;font-weight:800;background:linear-gradient(135deg,#f0c030,#c8900a);color:#0a1a0f;border:none;border-radius:12px;cursor:pointer;margin-top:10px;}
.plate-note{font-size:10px;color:#c8900a;margin-top:3px;font-style:italic;}

/* ── SCORING ── */
.rbar{background:#0d2a3d;border:1px solid #1a4a6d;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#60c8f0;font-weight:600;}
.thd{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;background:var(--cd);border:1px solid var(--br);border-radius:12px;padding:14px;margin-bottom:10px;}
.ttm{text-align:center;}
.ttm img,.ttm .ini{width:50px;height:50px;border-radius:50%;object-fit:contain;background:#fff;display:block;margin:0 auto 5px;}
.ttm .ini{font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.ttn{font-size:12px;font-weight:800;}
.tgp{font-size:10px;color:var(--t2);margin-top:2px;}
.tvs{font-size:20px;font-weight:900;color:var(--g);text-align:center;}
.sb{border:1px solid var(--br);border-radius:10px;padding:11px 12px;margin-bottom:7px;background:#0d1a12;}
.sb.dc{border-color:var(--g);box-shadow:0 0 0 2px rgba(240,192,48,.15);}
.sb.dn{border-color:#1a5a30;background:#0a1f12;}
.slt{font-size:10px;font-weight:800;color:var(--g);margin-bottom:3px;text-transform:uppercase;}
.sls{font-size:9px;color:var(--t2);margin-bottom:8px;}
.sr{display:grid;grid-template-columns:1fr 50px 14px 50px 36px;gap:5px;align-items:center;}
.stn{font-size:11px;font-weight:600;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.si{width:100%;padding:8px 4px;font-size:18px;font-weight:800;text-align:center;background:#0a1a0f;border:1.5px solid var(--br);border-radius:8px;color:var(--g);outline:none;}
.si:focus{border-color:var(--g);}
.sdsh{text-align:center;color:#3a5a40;font-weight:800;}
.ubt{padding:6px 4px;font-size:14px;background:#1a0a0a;border:1px solid #3a1a1a;border-radius:6px;cursor:pointer;color:#ff8080;text-align:center;width:100%;}
.plr{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px;}
.pln{font-size:10px;color:var(--t2);padding:3px 6px;background:#0a1a0f;border-radius:4px;border:1px solid var(--br);}
.pln.r{text-align:right;}
.mr{font-size:10px;font-weight:700;margin-top:5px;min-height:14px;}
.mw{color:var(--grn);}.ml{color:#ff6b6b;}
.db{background:#3d2800;border:1px solid var(--g);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:800;color:var(--g);text-align:center;margin-top:5px;}
.rb{background:var(--cd);border:1px solid var(--br);border-radius:12px;padding:16px;margin-top:8px;}
.rs{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:10px;}
.bs{font-size:42px;font-weight:900;text-align:center;color:var(--g);line-height:1;}
.tls{font-size:10px;color:var(--t2);text-align:center;margin-top:3px;font-weight:700;text-transform:uppercase;}
.dvl{font-size:24px;color:var(--br);text-align:center;font-weight:900;}
.wb{text-align:center;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:800;background:#0d2a18;color:var(--grn);border:1px solid #1a5a30;}
.wb.p{background:#0d1a12;color:var(--t2);border-color:var(--br);}
.wb.rd{background:#3d2000;color:#ffb347;border-color:#8a5000;}
.savescbtn{display:block;width:100%;padding:13px;font-size:14px;font-weight:800;background:linear-gradient(135deg,#f0c030,#c8900a);color:#0a1a0f;border:none;border-radius:12px;cursor:pointer;margin-top:8px;}
.cbtn{display:block;width:100%;padding:11px;font-size:13px;font-weight:700;background:transparent;color:var(--g);border:1.5px solid var(--g);border-radius:12px;cursor:pointer;margin-top:8px;}
.xbtn{display:block;width:100%;padding:11px;font-size:13px;font-weight:700;background:transparent;color:#60c8f0;border:1.5px solid #1a4a6d;border-radius:12px;cursor:pointer;margin-top:8px;}
.saved-badge{display:inline-block;font-size:10px;color:var(--grn);font-weight:700;margin-left:8px;vertical-align:middle;}

/* ── TABLES ── */
.tbr{display:flex;gap:6px;margin-bottom:12px;}
.tbt{flex:1;padding:8px 4px;font-size:11px;font-weight:800;border:1.5px solid var(--br);border-radius:10px;background:transparent;cursor:pointer;color:var(--t2);text-transform:uppercase;}
.tbt.on{background:var(--g);color:#0a1a0f;border-color:var(--g);}
.tc{display:none;}.tc.on{display:block;}
.grp-tbl-lbl{font-size:12px;font-weight:800;color:var(--g);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 6px;padding:6px 10px;background:#0d2a18;border-left:3px solid var(--g);border-radius:0 6px 6px 0;}
.pt{width:100%;border-collapse:collapse;font-size:12px;min-width:340px;}
.pt th{font-size:10px;font-weight:800;color:var(--t2);text-align:center;padding:8px 3px;border-bottom:1px solid var(--br);text-transform:uppercase;}
.pt th:first-child{text-align:left;}
.pt td{padding:9px 3px;text-align:center;border-bottom:1px solid var(--br);font-size:11px;}
.pt td:first-child{text-align:left;font-weight:700;font-size:11px;}
.pt tr.q td{color:var(--grn);}
.pt tr:last-child td{border-bottom:none;}
.qp{font-size:9px;font-weight:800;background:#0d2a18;color:var(--grn);padding:1px 4px;border-radius:4px;margin-left:3px;border:1px solid #1a5a30;}
.rn{display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;background:#0d2a18;border-radius:50%;font-size:10px;font-weight:800;margin-right:4px;color:var(--t2);}

/* ── KNOCKOUT ── */
.ko-div-tabs{display:flex;gap:6px;margin-bottom:14px;}
.ko-tab{flex:1;padding:8px 4px;font-size:11px;font-weight:800;border:1.5px solid var(--br);border-radius:10px;background:transparent;cursor:pointer;color:var(--t2);text-transform:uppercase;}
.ko-tab.on{background:var(--g);color:#0a1a0f;border-color:var(--g);}
.ko-stage{display:none;}.ko-stage.on{display:block;}
.ko-stage-label{font-size:12px;font-weight:800;color:var(--g);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 8px;padding:6px 10px;background:#0d2a18;border-left:3px solid var(--g);border-radius:0 6px 6px 0;}
.ko-match{background:var(--cd);border:1px solid var(--br);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.ko-match-lbl{font-size:10px;font-weight:800;color:var(--t2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
.ko-teams{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:8px;}
.ko-team-inp{width:100%;padding:8px 10px;font-size:12px;font-weight:700;background:#0d1f15;border:1.5px solid var(--br);border-radius:8px;color:var(--tx);outline:none;}
.ko-team-inp:focus{border-color:var(--g);}
.ko-vs{font-size:14px;font-weight:900;color:var(--g);text-align:center;}
.ko-scores{display:grid;grid-template-columns:1fr 40px 12px 40px;gap:5px;align-items:center;margin-bottom:6px;}
.ko-match-name{font-size:10px;color:var(--t2);font-size:11px;font-weight:600;}
.ko-si{width:100%;padding:7px 4px;font-size:16px;font-weight:800;text-align:center;background:#0a1a0f;border:1.5px solid var(--br);border-radius:8px;color:var(--g);outline:none;}
.ko-si:focus{border-color:var(--g);}
.ko-dash{text-align:center;color:#3a5a40;font-weight:800;}
.ko-result{font-size:11px;font-weight:700;color:var(--grn);margin-top:4px;min-height:14px;}
.ko-save-btn{display:block;width:100%;padding:11px;font-size:13px;font-weight:800;background:linear-gradient(135deg,#f0c030,#c8900a);color:#0a1a0f;border:none;border-radius:10px;cursor:pointer;margin-top:8px;}
.ko-players-preview{font-size:10px;color:var(--t2);margin-top:6px;padding:6px 8px;background:#0a1a0f;border-radius:6px;border:1px solid var(--br);min-height:20px;}

/* ── LOCKED ── */
.lkd{text-align:center;padding:50px 20px;}
.lkd .lki{font-size:48px;margin-bottom:14px;}
.lkd h3{font-size:16px;font-weight:800;color:var(--g);margin-bottom:8px;}
.lkd p{font-size:13px;color:var(--t2);}
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

</head>
